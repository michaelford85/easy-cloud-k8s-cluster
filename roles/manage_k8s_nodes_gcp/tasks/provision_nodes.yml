---
- name: Map instance_size shorthand to GCP machine type
  ansible.builtin.set_fact:
    gcp_machine_type: "{{ {'large': 'e2-standard-2', 'xlarge': 'e2-standard-4'}.get(instance_size, instance_size) }}"

# Create the CCM service account and grant it IAM roles before Terraform runs.
# Using gcloud here (rather than Terraform) avoids the 30-day name-reuse
# restriction that GCP enforces on deleted service accounts. The SA persists
# across cluster teardown/re-provision cycles and is simply reused each time.
- name: Create GCP CCM service account (idempotent)
  ansible.builtin.command:
    cmd: >
      gcloud iam service-accounts create {{ cloud_prefix }}-ccm
      --display-name="{{ cloud_prefix }} Cloud Controller Manager"
      --project={{ gcp_project }}
  register: sa_create
  failed_when:
    - sa_create.rc != 0
    - "'already exists' not in sa_create.stderr"
  changed_when: sa_create.rc == 0

- name: Grant IAM roles to CCM service account (idempotent)
  ansible.builtin.command:
    cmd: >
      gcloud projects add-iam-policy-binding {{ gcp_project }}
      --member="serviceAccount:{{ cloud_prefix }}-ccm@{{ gcp_project }}.iam.gserviceaccount.com"
      --role="{{ item }}"
      --condition=None
  loop:
    - roles/compute.viewer
    - roles/compute.loadBalancerAdmin
    - roles/compute.securityAdmin

- name: Copy GCP Terraform Directory
  ansible.builtin.copy:
    src: gcp_deploy
    dest: "{{ working_dir }}"
    mode: 0777

- name: Initialize Terraform
  ansible.builtin.command:
    cmd: terraform init
    chdir: "{{ working_dir }}/gcp_deploy"

- name: Provision on GCP via Terraform
  community.general.terraform:
    project_path: "{{ working_dir }}/gcp_deploy"
    state: present
    variables:
      gcp_project: "{{ gcp_project }}"
      gcp_region: "{{ gcp_region }}"
      gcp_zone: "{{ gcp_zone }}"
      gcp_prefix: "{{ cloud_prefix }}"
      gcp_instance_username: "{{ gcp_instance_username | default('ubuntu') }}"
      master_machine_type: "{{ gcp_machine_type }}"
      gcp_vpc_cidr: "{{ gcp_vpc_cidr | default('192.168.0.0/16') }}"
      gcp_subnet_cidr: "{{ gcp_vpc_subnet | default('192.168.0.0/20') }}"
      gcp_nodeport_cidr: "{{ gcp_nodeport_cidr | default('0.0.0.0/0') }}"
      num_instances: "{{ num_instances }}"
      gcp_disk_image: "{{ gcp_disk_image }}"
      machine_type: "{{ gcp_machine_type }}"
      cloud_master_volume_size: "{{ cloud_master_volume_size }}"
      cloud_worker_volume_size: "{{ cloud_worker_volume_size }}"
  register: terraform_output
