plugin: google.cloud.gcp_compute
auth_kind: application
projects:
# Replace with your GCP project name
- "river-inquiry-256921"
zones:
  - us-central1-a
keyed_groups:
  - key: labels.role
    prefix: k8s
hostnames:
  - name
filters:
  - status eq RUNNING
  - labels.application eq kubeadm-k8s
compose:
  ansible_host: networkInterfaces[0].accessConfigs[0].natIP
